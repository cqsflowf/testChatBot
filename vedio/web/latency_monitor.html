<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时延监控 - 全双工语音对话系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 20px 0;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: #a0a0a0;
            font-size: 0.85rem;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .stat-card .value {
            font-size: 1.6rem;
            font-weight: bold;
            color: #00d2ff;
            margin-bottom: 5px;
        }

        .stat-card .label {
            font-size: 0.75rem;
            color: #888;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
        }

        @media (max-width: 1000px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .timeline-container {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .timeline-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .timeline-title {
            font-size: 1.1rem;
            color: #00d2ff;
        }

        .current-text {
            background: rgba(0, 210, 255, 0.1);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.9rem;
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .timeline-chart {
            position: relative;
            height: 300px;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            overflow: hidden;
        }

        .timeline-axis {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 30px;
            width: 60px;
            background: rgba(0,0,0,0.3);
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        .axis-label {
            position: absolute;
            right: 8px;
            font-size: 0.7rem;
            color: #888;
            white-space: nowrap;
            transform: translateY(-50%);
        }

        .timeline-bars {
            position: absolute;
            left: 70px;
            right: 10px;
            top: 10px;
            bottom: 30px;
        }

        .bar-container {
            position: absolute;
            left: 0;
            right: 0;
            height: 28px;
        }

        .bar {
            position: absolute;
            height: 20px;
            top: 4px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            padding-left: 8px;
            font-size: 0.7rem;
            white-space: nowrap;
            overflow: hidden;
            transition: all 0.3s ease;
            min-width: 3px;
        }

        .bar:hover {
            filter: brightness(1.2);
        }

        .bar-label {
            position: absolute;
            left: -65px;
            width: 60px;
            text-align: right;
            font-size: 0.7rem;
            color: #aaa;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .time-scale {
            position: absolute;
            left: 70px;
            right: 10px;
            bottom: 5px;
            height: 20px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        .time-tick {
            position: absolute;
            font-size: 0.65rem;
            color: #666;
            transform: translateX(-50%);
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: #aaa;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        .history-container {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            max-height: 600px;
            overflow-y: auto;
        }

        .history-title {
            font-size: 1.1rem;
            color: #00d2ff;
            margin-bottom: 15px;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .history-item {
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .history-item:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(0, 210, 255, 0.3);
        }

        .history-item.active {
            border-color: #00d2ff;
            background: rgba(0, 210, 255, 0.1);
        }

        .history-text {
            font-size: 0.85rem;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-metrics {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 5px;
            font-size: 0.7rem;
            color: #888;
        }

        .metric {
            display: flex;
            justify-content: space-between;
        }

        .metric-value {
            color: #00d2ff;
        }

        .status-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #666;
        }

        .status-dot.connected { background: #4caf50; }
        .status-dot.active { background: #2196f3; animation: pulse 1s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .detail-panel {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-top: 20px;
        }

        .detail-title {
            font-size: 1rem;
            color: #00d2ff;
            margin-bottom: 15px;
        }

        .detail-records {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .record-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: rgba(0,0,0,0.2);
            border-radius: 6px;
            font-size: 0.8rem;
        }

        .record-name {
            color: #aaa;
        }

        .record-time {
            color: #00d2ff;
            font-weight: bold;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>时延监控面板</h1>
            <p>实时显示一句话在系统中各阶段的耗时</p>
        </div>

        <div class="status-bar">
            <div class="status-item">
                <div class="status-dot" id="connectionStatus"></div>
                <span id="connectionText">未连接</span>
            </div>
            <div class="status-item">
                <div class="status-dot" id="activeStatus"></div>
                <span id="activeText">等待输入</span>
            </div>
            <div class="status-item">
                <span>总句数: <strong id="totalSentences">0</strong></span>
            </div>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <div class="value" id="avgTotal">--</div>
                <div class="label">平均总耗时 (ms)</div>
            </div>
            <div class="stat-card">
                <div class="value" id="avgAsr">--</div>
                <div class="label">平均ASR延迟 (ms)</div>
            </div>
            <div class="stat-card">
                <div class="value" id="avgLlm">--</div>
                <div class="label">平均LLM耗时 (ms)</div>
            </div>
            <div class="stat-card">
                <div class="value" id="avgTts">--</div>
                <div class="label">平均TTS耗时 (ms)</div>
            </div>
        </div>

        <div class="main-content">
            <div class="timeline-container">
                <div class="timeline-header">
                    <div class="timeline-title">实时时延时间线</div>
                    <div class="current-text" id="currentText">等待语音输入...</div>
                </div>

                <div class="timeline-chart" id="timelineChart">
                    <div class="timeline-axis" id="timelineAxis"></div>
                    <div class="timeline-bars" id="timelineBars"></div>
                    <div class="time-scale" id="timeScale"></div>
                </div>

                <div class="legend" id="legend"></div>

                <div class="detail-panel">
                    <div class="detail-title">详细耗时</div>
                    <div class="detail-records" id="detailRecords">
                        <div class="empty-state">等待数据...</div>
                    </div>
                </div>
            </div>

            <div class="history-container">
                <div class="history-title">历史记录</div>
                <div class="history-list" id="historyList">
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/>
                        </svg>
                        <div>暂无历史记录</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 配置
        const WS_URL = `ws://${window.location.hostname}:8765/ws/`;
        const CLIENT_ID = 'monitor_' + Date.now();

        // 节点配置
        const NODES = [
            { name: 'vad_detect', label: '声学VAD', color: '#4CAF50' },
            { name: 'asr_first_text', label: 'ASR首字', color: '#03A9F4' },
            { name: 'asr_streaming', label: 'ASR流式', color: '#2196F3' },
            { name: 'semantic_vad', label: '语义VAD', color: '#9C27B0' },
            { name: 'emotion', label: '情绪识别', color: '#E91E63' },
            { name: 'llm_process', label: 'LLM处理', color: '#FF9800' },
            { name: 'tool_execute', label: '工具调用', color: '#795548' },
            { name: 'tts_synthesize', label: 'TTS合成', color: '#00BCD4' },
        ];

        // 状态
        let ws = null;
        let currentData = null;
        let historyData = [];

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            initLegend();
            initTimeline();
            connect();
            fetchHistory();
        });

        // WebSocket连接
        function connect() {
            ws = new WebSocket(WS_URL + CLIENT_ID);

            ws.onopen = () => {
                updateConnectionStatus(true);
                console.log('WebSocket已连接');
            };

            ws.onclose = () => {
                updateConnectionStatus(false);
                console.log('WebSocket已断开');
                setTimeout(connect, 3000);
            };

            ws.onerror = (error) => {
                console.error('WebSocket错误:', error);
            };

            ws.onmessage = (event) => {
                const message = JSON.parse(event.data);
                handleMessage(message);
            };
        }

        // 处理消息
        function handleMessage(message) {
            switch (message.type) {
                case 'latency_update':
                    updateLatency(message.data);
                    break;
                case 'result':
                    fetchHistory();
                    break;
            }
        }

        // 更新时延显示
        function updateLatency(data) {
            if (!data) return;

            currentData = data;

            // 更新当前文本
            document.getElementById('currentText').textContent = data.text || '处理中...';

            // 更新活动状态
            document.getElementById('activeStatus').className = 'status-dot active';
            document.getElementById('activeText').textContent = '处理中';

            // 更新时间线
            renderTimeline(data);

            // 更新详细面板
            renderDetails(data);

            // 如果完成，更新历史
            if (data.is_complete) {
                document.getElementById('activeStatus').className = 'status-dot';
                document.getElementById('activeText').textContent = '处理完成';
                fetchHistory();
                fetchStats();
            }
        }

        // 初始化图例
        function initLegend() {
            const legend = document.getElementById('legend');
            legend.innerHTML = NODES.map(node => `
                <div class="legend-item">
                    <div class="legend-color" style="background: ${node.color}"></div>
                    <span>${node.label}</span>
                </div>
            `).join('');
        }

        // 初始化时间线
        function initTimeline() {
            const axis = document.getElementById('timelineAxis');
            axis.innerHTML = NODES.map((node, i) => `
                <div class="axis-label" style="top: ${10 + i * 35}px">${node.label}</div>
            `).join('');
        }

        // 渲染时间线
        function renderTimeline(data) {
            const bars = document.getElementById('timelineBars');
            const scale = document.getElementById('timeScale');

            if (!data.records || data.records.length === 0) {
                bars.innerHTML = '<div class="empty-state">等待数据...</div>';
                scale.innerHTML = '';
                return;
            }

            // 计算总时间范围
            const maxTime = Math.max(...data.records.map(r => r.end_time), 1000);

            // 渲染条形图
            bars.innerHTML = NODES.map((node, i) => {
                const record = data.records.find(r => r.name === node.name);
                if (!record) {
                    return `<div class="bar-container" style="top: ${i * 35}px">
                        <div class="bar-label">${node.label}</div>
                    </div>`;
                }

                const left = (record.start_time / maxTime) * 100;
                const width = Math.max((record.duration / maxTime) * 100, 1);

                return `
                    <div class="bar-container" style="top: ${i * 35}px">
                        <div class="bar-label">${node.label}</div>
                        <div class="bar" style="left: ${left}%; width: ${width}%; background: ${node.color}">
                            ${record.duration.toFixed(0)}ms
                        </div>
                    </div>
                `;
            }).join('');

            // 渲染时间刻度
            const tickCount = 5;
            scale.innerHTML = Array.from({length: tickCount + 1}, (_, i) => {
                const time = (maxTime / tickCount) * i;
                const left = (i / tickCount) * 100;
                return `<div class="time-tick" style="left: ${left}%">${time.toFixed(0)}ms</div>`;
            }).join('');
        }

        // 渲染详细面板
        function renderDetails(data) {
            const container = document.getElementById('detailRecords');

            if (!data.records || data.records.length === 0) {
                container.innerHTML = '<div class="empty-state">等待数据...</div>';
                return;
            }

            container.innerHTML = data.records.map(record => {
                const node = NODES.find(n => n.name === record.name) || { label: record.name };
                return `
                    <div class="record-row">
                        <span class="record-name">${node.label || record.name}</span>
                        <span class="record-time">${record.duration.toFixed(2)} ms</span>
                    </div>
                `;
            }).join('');

            // 添加总耗时
            if (data.metrics && data.metrics.total_latency > 0) {
                container.innerHTML += `
                    <div class="record-row" style="background: rgba(0, 210, 255, 0.1); margin-top: 10px;">
                        <span class="record-name" style="color: #00d2ff;">总耗时</span>
                        <span class="record-time" style="font-size: 1rem;">${data.metrics.total_latency.toFixed(2)} ms</span>
                    </div>
                `;
            }
        }

        // 获取历史数据
        async function fetchHistory() {
            try {
                const response = await fetch('/latency/history?limit=10');
                const data = await response.json();
                historyData = data.history || [];
                renderHistory();
            } catch (error) {
                console.error('获取历史数据失败:', error);
            }
        }

        // 渲染历史
        function renderHistory() {
            const container = document.getElementById('historyList');

            if (historyData.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/>
                        </svg>
                        <div>暂无历史记录</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = historyData.reverse().map((item, index) => `
                <div class="history-item" onclick="showHistoryItem(${historyData.length - 1 - index})">
                    <div class="history-text">"${item.text || '无文本'}"</div>
                    <div class="history-metrics">
                        <div class="metric">
                            <span>总耗时</span>
                            <span class="metric-value">${item.metrics?.total_latency?.toFixed(0) || '--'}ms</span>
                        </div>
                        <div class="metric">
                            <span>ASR</span>
                            <span class="metric-value">${item.metrics?.first_asr_latency?.toFixed(0) || '--'}ms</span>
                        </div>
                        <div class="metric">
                            <span>LLM</span>
                            <span class="metric-value">${item.metrics?.llm_latency?.toFixed(0) || '--'}ms</span>
                        </div>
                        <div class="metric">
                            <span>TTS</span>
                            <span class="metric-value">${item.metrics?.tts_latency?.toFixed(0) || '--'}ms</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 显示历史项
        function showHistoryItem(index) {
            const item = historyData[index];
            if (item) {
                currentData = item;
                document.getElementById('currentText').textContent = item.text || '无文本';
                renderTimeline(item);
                renderDetails(item);

                // 高亮选中项
                document.querySelectorAll('.history-item').forEach((el, i) => {
                    el.classList.toggle('active', i === historyData.length - 1 - index);
                });
            }
        }

        // 获取统计数据
        async function fetchStats() {
            try {
                const response = await fetch('/latency/stats');
                const stats = await response.json();

                document.getElementById('totalSentences').textContent = stats.total_sentences;
                document.getElementById('avgTotal').textContent = stats.avg_total_latency?.toFixed(0) || '--';
                document.getElementById('avgAsr').textContent = stats.avg_asr_latency?.toFixed(0) || '--';
                document.getElementById('avgLlm').textContent = stats.avg_llm_latency?.toFixed(0) || '--';
                document.getElementById('avgTts').textContent = stats.avg_tts_latency?.toFixed(0) || '--';
            } catch (error) {
                console.error('获取统计数据失败:', error);
            }
        }

        // 更新连接状态
        function updateConnectionStatus(connected) {
            const dot = document.getElementById('connectionStatus');
            const text = document.getElementById('connectionText');

            if (connected) {
                dot.className = 'status-dot connected';
                text.textContent = '已连接';
            } else {
                dot.className = 'status-dot';
                text.textContent = '未连接';
            }
        }

        // 定期刷新统计数据
        setInterval(fetchStats, 5000);
        fetchStats();
    </script>
</body>
</html>
