<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全双工语音对话系统 v3.0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 30px 0;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: #a0a0a0;
            font-size: 0.9rem;
        }

        .status-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #666;
        }

        .status-dot.connected { background: #4caf50; }
        .status-dot.listening { background: #2196f3; animation: pulse 1s infinite; }
        .status-dot.processing { background: #ff9800; animation: pulse 0.5s infinite; }
        .status-dot.speaking { background: #9c27b0; animation: pulse 0.8s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .chat-container {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
            height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .message.user {
            align-items: flex-end;
        }

        .message.assistant {
            align-items: flex-start;
        }

        .message-bubble {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 18px;
            position: relative;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, #3a7bd5, #00d2ff);
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-bubble {
            background: rgba(255,255,255,0.1);
            border-bottom-left-radius: 4px;
        }

        .message-meta {
            font-size: 0.75rem;
            color: #888;
            margin-top: 4px;
            display: flex;
            gap: 10px;
        }

        .emotion-tag {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            background: rgba(255,255,255,0.1);
        }

        .emotion-positive { background: rgba(76, 175, 80, 0.3); }
        .emotion-negative { background: rgba(244, 67, 54, 0.3); }
        .emotion-angry { background: rgba(255, 87, 34, 0.3); }
        .emotion-sad { background: rgba(33, 150, 243, 0.3); }
        .emotion-surprised { background: rgba(156, 39, 176, 0.3); }

        .tool-status {
            margin-top: 8px;
            padding: 8px 12px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tool-status .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid #3a7bd5;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .control-panel {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .mic-button {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #3a7bd5, #00d2ff);
            color: white;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(58, 123, 213, 0.4);
        }

        .mic-button:hover {
            transform: scale(1.05);
        }

        .mic-button.recording {
            background: linear-gradient(135deg, #f44336, #ff5722);
            animation: recording-pulse 1s infinite;
        }

        @keyframes recording-pulse {
            0%, 100% { box-shadow: 0 4px 20px rgba(244, 67, 54, 0.4); }
            50% { box-shadow: 0 4px 40px rgba(244, 67, 54, 0.8); }
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .btn-interrupt {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
            border: 1px solid #f44336;
        }

        .btn-interrupt:hover {
            background: #f44336;
            color: white;
        }

        .btn-reset {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .btn-reset:hover {
            background: rgba(255,255,255,0.2);
        }

        .btn-tts {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 1px solid #4caf50;
        }

        .btn-tts:hover {
            background: #4caf50;
            color: white;
        }

        .btn-tts.disabled {
            background: rgba(158, 158, 158, 0.2);
            color: #9e9e9e;
            border: 1px solid #9e9e9e;
        }

        .btn-tts.disabled:hover {
            background: #9e9e9e;
            color: white;
        }

        .text-input-container {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .text-input {
            flex: 1;
            padding: 15px 20px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 25px;
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 1rem;
            outline: none;
        }

        .text-input:focus {
            border-color: #3a7bd5;
        }

        .text-input::placeholder {
            color: #666;
        }

        .btn-send {
            padding: 15px 30px;
            background: linear-gradient(135deg, #3a7bd5, #00d2ff);
            border: none;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            font-size: 1rem;
        }

        .visualizer {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            margin: 20px 0;
        }

        .visualizer-bar {
            width: 4px;
            background: linear-gradient(180deg, #3a7bd5, #00d2ff);
            border-radius: 2px;
            transition: height 0.05s ease;
        }

        .partial-text {
            text-align: center;
            color: #888;
            font-style: italic;
            min-height: 24px;
            margin-bottom: 10px;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }

        .feature-card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .feature-card h3 {
            font-size: 1rem;
            margin-bottom: 8px;
            color: #00d2ff;
        }

        .feature-card p {
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>全双工语音对话系统 v3.0</h1>
            <p>Qwen ASR 17B | 流式语义VAD | 并行情绪识别 | 支持打断</p>
        </div>

        <div class="status-bar">
            <div class="status-item">
                <div class="status-dot" id="connectionStatus"></div>
                <span id="connectionText">未连接</span>
            </div>
            <div class="status-item">
                <div class="status-dot" id="dialogStatus"></div>
                <span id="dialogText">空闲</span>
            </div>
            <div class="status-item">
                <span id="emotionDisplay">情绪: --</span>
            </div>
        </div>

        <div class="visualizer" id="visualizer"></div>

        <div class="partial-text" id="partialText"></div>

        <div class="chat-container" id="chatContainer">
            <div class="message assistant">
                <div class="message-bubble">
                    您好！我是智能语音助手。点击麦克风按钮开始语音对话，或输入文字与我交流。
                </div>
            </div>
        </div>

        <div class="control-panel">
            <button class="btn btn-interrupt" onclick="interrupt()">打断</button>
            <button class="mic-button" id="micButton" onclick="toggleRecording()">
                <svg id="micIcon" width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                </svg>
            </button>
            <button class="btn btn-tts" id="ttsButton" onclick="toggleTTS()">语音: 开</button>
            <button class="btn btn-reset" onclick="resetDialog()">重置</button>
        </div>

        <div class="text-input-container">
            <input type="text" class="text-input" id="textInput" placeholder="输入文字消息..."
                   onkeypress="if(event.key==='Enter')sendText()">
            <button class="btn btn-send" onclick="sendText()">发送</button>
        </div>

        <div class="features">
            <div class="feature-card">
                <h3>Qwen ASR 17B</h3>
                <p>流式语音识别，帧长20ms</p>
            </div>
            <div class="feature-card">
                <h3>流式语义VAD</h3>
                <p>边说边判断，智能断句</p>
            </div>
            <div class="feature-card">
                <h3>并行情绪识别</h3>
                <p>实时识别用户情绪</p>
            </div>
            <div class="feature-card">
                <h3>全双工交互</h3>
                <p>随时打断，自然交互</p>
            </div>
        </div>
    </div>

    <script>
        // 配置
        const WS_URL = `ws://${window.location.hostname}:8765/ws/`;
        const CLIENT_ID = 'client_' + Date.now();
        const SAMPLE_RATE = 16000;

        // 状态
        let ws = null;
        let isRecording = false;
        let audioContext = null;
        let audioWorkletNode = null;
        let mediaStream = null;
        let analyser = null;
        let animationId = null;
        let ttsEnabled = true;  // TTS 默认启用

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            initVisualizer();
            connect();
        });

        // WebSocket连接
        function connect() {
            ws = new WebSocket(WS_URL + CLIENT_ID);

            ws.onopen = () => {
                updateConnectionStatus(true);
                console.log('WebSocket已连接');
            };

            ws.onclose = () => {
                updateConnectionStatus(false);
                console.log('WebSocket已断开');
                setTimeout(connect, 5000);
            };

            ws.onerror = (error) => {
                console.error('WebSocket错误:', error);
            };

            ws.onmessage = (event) => {
                const message = JSON.parse(event.data);
                handleMessage(message);
            };
        }

        // 处理服务器消息
        function handleMessage(message) {
            console.log('收到消息:', message.type);

            switch (message.type) {
                case 'result':
                    handleResult(message.data);
                    break;
                case 'state_change':
                    updateDialogStatus(message.data.new_state);
                    break;
                case 'partial_asr':
                    updatePartialText(`识别中: ${message.data.text}`);
                    break;
                case 'tool_executing':
                    showToolExecuting(message.data.tool_name, message.data.tool_args);
                    break;
                case 'llm_chunk':
                    handleLLMChunk(message.data.text);
                    break;
                case 'audio_chunk':
                    handleAudioChunk(message.data.audio);
                    break;
                case 'clear_audio':
                    // 新问题开始，清空音频队列
                    stopAudioPlayback();
                    console.log('[音频流] 已清空音频队列');
                    break;
                case 'tts_state':
                    // TTS 状态变化
                    updateTTSButton(message.data.enabled);
                    console.log('[TTS] 状态变化:', message.data.enabled);
                    break;
                case 'pong':
                    break;
            }
        }

        // 流式输出状态
        let streamingMessageId = null;
        let streamingContent = '';

        // 流式音频播放器 - 使用队列连续播放
        let audioQueue = [];
        let isPlayingAudio = false;
        let currentAudio = null;

        // 处理TTS音频块（实时播报）
        function handleAudioChunk(base64Audio) {
            // 如果 TTS 已禁用，不播放音频
            if (!ttsEnabled) {
                console.log('[音频] TTS 已禁用，跳过播放');
                return;
            }

            // 将音频块加入队列
            audioQueue.push(base64Audio);
            console.log('[音频] 加入队列, 队列长度:', audioQueue.length, '播放中:', isPlayingAudio);

            // 如果没有在播放，开始播放
            if (!isPlayingAudio) {
                playNextAudioChunk();
            }
        }

        // 播放下一个音频块
        function playNextAudioChunk() {
            // 检查队列
            if (audioQueue.length === 0) {
                isPlayingAudio = false;
                currentAudio = null;
                console.log('[音频] 队列为空，停止播放');
                return;
            }

            // 取出下一个音频
            const base64Audio = audioQueue.shift();
            isPlayingAudio = true;

            console.log('[音频] 开始播放, 剩余队列:', audioQueue.length);

            // 创建新的音频元素
            const audio = new Audio('data:audio/mp3;base64,' + base64Audio);
            currentAudio = audio;

            audio.onended = function() {
                console.log('[音频] 播放结束');
                currentAudio = null;
                // 检查是否还有下一个
                if (audioQueue.length > 0) {
                    playNextAudioChunk();
                } else {
                    isPlayingAudio = false;
                }
            };

            audio.onerror = function(e) {
                console.error('[音频] 播放错误:', e);
                currentAudio = null;
                // 继续播放下一个
                if (audioQueue.length > 0) {
                    playNextAudioChunk();
                } else {
                    isPlayingAudio = false;
                }
            };

            audio.play().catch(e => {
                console.error('[音频] 播放失败:', e);
                currentAudio = null;
                // 继续播放下一个
                if (audioQueue.length > 0) {
                    playNextAudioChunk();
                } else {
                    isPlayingAudio = false;
                }
            });
        }

        // 停止音频播放（打断时调用）
        function stopAudioPlayback() {
            console.log('[音频] 停止播放，清空队列');
            // 清空队列
            audioQueue = [];

            // 停止当前播放
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }

            isPlayingAudio = false;
        }

        // 处理LLM流式输出块
        function handleLLMChunk(chunk) {
            // 如果是第一个块，创建新的消息元素
            if (!streamingMessageId) {
                const chatContainer = document.getElementById('chatContainer');
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message assistant';
                messageDiv.id = 'streaming-message';
                messageDiv.innerHTML = '<div class="message-bubble"></div><div class="message-meta"><span>' + new Date().toLocaleTimeString() + '</span></div>';
                chatContainer.appendChild(messageDiv);
                chatContainer.scrollTop = chatContainer.scrollHeight;
                streamingMessageId = 'streaming-message';
                streamingContent = '';
            }

            // 累积内容
            streamingContent += chunk;

            // 更新显示
            const messageDiv = document.getElementById(streamingMessageId);
            if (messageDiv) {
                const bubble = messageDiv.querySelector('.message-bubble');
                if (bubble) {
                    bubble.textContent = streamingContent;
                }
                // 滚动到底部
                const chatContainer = document.getElementById('chatContainer');
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }

            // 更新部分文本区域
            updatePartialText(`回复中: ${streamingContent}`);
        }

        // 处理对话结果
        function handleResult(data) {
            updatePartialText('');

            // 清除流式消息ID
            const streamingMsg = document.getElementById('streaming-message');
            if (streamingMsg) {
                streamingMsg.remove();
            }
            streamingMessageId = null;
            streamingContent = '';

            // 添加用户消息
            if (data.text) {
                addMessage('user', data.text, {
                    emotion: data.emotion
                });
            }

            // 添加助手回复（LLM总结后的响应）
            if (data.response) {
                addMessage('assistant', data.response, {
                    toolCalls: data.tool_calls,
                    llmEmotion: data.llm_emotion  // 大模型情绪
                });

                // 注意：音频通过 audio_chunk 消息实时播放
                // 这里只作为备用，如果有完整音频数据也播放
                if (data.audio && audioQueue.length === 0) {
                    playAudio(data.audio);
                }
            }

            updateEmotionDisplay(data.emotion);
        }

        // 显示工具执行状态
        function showToolExecuting(toolName, toolArgs) {
            const partialText = document.getElementById('partialText');
            partialText.innerHTML = `<span style="color: #3a7bd5;">正在执行: ${toolName}...</span>`;
        }

        // 添加消息到聊天框
        function addMessage(role, content, extras = {}) {
            const chatContainer = document.getElementById('chatContainer');

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            let html = `<div class="message-bubble">${escapeHtml(content)}</div>`;

            // 元信息
            let metaHtml = '<div class="message-meta">';
            if (extras.emotion) {
                metaHtml += `<span class="emotion-tag emotion-${extras.emotion}">${getEmotionText(extras.emotion)}</span>`;
            }
            if (extras.llmEmotion) {
                metaHtml += `<span class="emotion-tag emotion-${extras.llmEmotion}">AI: ${getEmotionText(extras.llmEmotion)}</span>`;
            }
            if (extras.toolCalls && extras.toolCalls.length > 0) {
                metaHtml += `<span style="color: #3a7bd5;">工具: ${extras.toolCalls.map(t => t.name).join(', ')}</span>`;
            }
            metaHtml += `<span>${new Date().toLocaleTimeString()}</span>`;
            metaHtml += '</div>';

            messageDiv.innerHTML = html + metaHtml;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 切换录音
        async function toggleRecording() {
            if (isRecording) {
                stopRecording();
            } else {
                await startRecording();
            }
        }

        // 开始录音 - 全双工模式
        async function startRecording() {
            try {
                // 获取麦克风权限
                mediaStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        sampleRate: SAMPLE_RATE,
                        channelCount: 1,
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    }
                });

                // 创建音频上下文
                audioContext = new AudioContext({ sampleRate: SAMPLE_RATE });

                // 创建分析器（用于可视化）
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                const source = audioContext.createMediaStreamSource(mediaStream);
                source.connect(analyser);

                // 使用 AudioWorklet 或 ScriptProcessor 处理音频
                await processAudioStream(source);

                isRecording = true;
                updateMicButton(true);
                startVisualization();

                console.log('录音开始 - 全双工模式');

            } catch (error) {
                console.error('无法访问麦克风:', error);
                alert('无法访问麦克风，请确保已授权。错误: ' + error.message);
            }
        }

        // 处理音频流
        async function processAudioStream(source) {
            // 使用 ScriptProcessor (兼容性更好)
            const bufferSize = 4096;
            const scriptProcessor = audioContext.createScriptProcessor(bufferSize, 1, 1);

            source.connect(scriptProcessor);
            scriptProcessor.connect(audioContext.destination);

            scriptProcessor.onaudioprocess = (event) => {
                if (!isRecording || !ws || ws.readyState !== WebSocket.OPEN) {
                    return;
                }

                const inputData = event.inputBuffer.getChannelData(0);

                // 转换为16位PCM
                const pcmData = floatTo16BitPCM(inputData);

                // 发送到服务器
                ws.send(pcmData.buffer);
            };
        }

        // Float32 转 Int16 PCM
        function floatTo16BitPCM(float32Array) {
            const int16Array = new Int16Array(float32Array.length);
            for (let i = 0; i < float32Array.length; i++) {
                const s = Math.max(-1, Math.min(1, float32Array[i]));
                int16Array[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
            }
            return int16Array;
        }

        // 停止录音
        function stopRecording() {
            isRecording = false;
            updateMicButton(false);
            stopVisualization();

            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }

            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }

            console.log('录音停止');
        }

        // 发送文本
        function sendText() {
            const input = document.getElementById('textInput');
            const text = input.value.trim();

            if (text && ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'text',
                    text: text
                }));
                input.value = '';
            }
        }

        // 打断
        function interrupt() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'interrupt' }));

                // 停止流式音频播放
                stopAudioPlayback();

                // 停止旧的音频播放器
                const audio = document.getElementById('audioPlayer');
                if (audio) {
                    audio.pause();
                    audio.currentTime = 0;
                }
            }
        }

        // 重置对话
        function resetDialog() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'reset' }));

                // 停止音频播放
                stopAudioPlayback();

                const chatContainer = document.getElementById('chatContainer');
                chatContainer.innerHTML = `
                    <div class="message assistant">
                        <div class="message-bubble">
                            对话已重置。您可以开始新的对话。
                        </div>
                    </div>
                `;
            }
        }

        // 切换 TTS 开关
        function toggleTTS() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'tts_toggle' }));
            }
        }

        // 更新 TTS 按钮状态
        function updateTTSButton(enabled) {
            ttsEnabled = enabled;
            const btn = document.getElementById('ttsButton');

            if (enabled) {
                btn.textContent = '语音: 开';
                btn.classList.remove('disabled');
            } else {
                btn.textContent = '语音: 关';
                btn.classList.add('disabled');
                // 禁用时停止当前播放
                stopAudioPlayback();
            }
        }

        // 播放音频
        function playAudio(base64Audio) {
            let audio = document.getElementById('audioPlayer');
            if (!audio) {
                audio = document.createElement('audio');
                audio.id = 'audioPlayer';
                document.body.appendChild(audio);
            }
            audio.src = 'data:audio/mp3;base64,' + base64Audio;
            audio.play().catch(e => console.error('播放失败:', e));
        }

        // 更新连接状态
        function updateConnectionStatus(connected) {
            const dot = document.getElementById('connectionStatus');
            const text = document.getElementById('connectionText');

            if (connected) {
                dot.className = 'status-dot connected';
                text.textContent = '已连接';
            } else {
                dot.className = 'status-dot';
                text.textContent = '未连接';
            }
        }

        // 更新对话状态
        function updateDialogStatus(state) {
            const dot = document.getElementById('dialogStatus');
            const text = document.getElementById('dialogText');

            const stateMap = {
                'idle': { cls: '', text: '空闲' },
                'listening': { cls: 'listening', text: '聆听中...' },
                'processing': { cls: 'processing', text: '处理中...' },
                'thinking': { cls: 'processing', text: '思考中...' },
                'speaking': { cls: 'speaking', text: '说话中...' }
            };

            const info = stateMap[state] || stateMap['idle'];
            dot.className = 'status-dot ' + info.cls;
            text.textContent = info.text;
        }

        // 更新部分文本
        function updatePartialText(text) {
            document.getElementById('partialText').textContent = text;
        }

        // 更新情绪显示
        function updateEmotionDisplay(emotion) {
            document.getElementById('emotionDisplay').textContent = `情绪: ${getEmotionText(emotion)}`;
        }

        // 获取情绪文本
        function getEmotionText(emotion) {
            const map = {
                'positive': '积极',
                'negative': '消极',
                'neutral': '中性',
                'angry': '愤怒',
                'sad': '悲伤',
                'surprised': '惊讶'
            };
            return map[emotion] || '未知';
        }

        // 更新麦克风按钮
        function updateMicButton(recording) {
            const btn = document.getElementById('micButton');
            const icon = document.getElementById('micIcon');

            if (recording) {
                btn.classList.add('recording');
                icon.innerHTML = '<rect x="6" y="6" width="12" height="12" fill="currentColor"/>';
            } else {
                btn.classList.remove('recording');
                icon.innerHTML = '<path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>';
            }
        }

        // 初始化可视化
        function initVisualizer() {
            const visualizer = document.getElementById('visualizer');
            for (let i = 0; i < 30; i++) {
                const bar = document.createElement('div');
                bar.className = 'visualizer-bar';
                bar.style.height = '5px';
                visualizer.appendChild(bar);
            }
        }

        // 开始可视化
        function startVisualization() {
            if (!analyser) return;

            const bars = document.querySelectorAll('.visualizer-bar');
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            function draw() {
                if (!isRecording) return;

                analyser.getByteFrequencyData(dataArray);

                const step = Math.floor(bufferLength / bars.length);
                bars.forEach((bar, i) => {
                    const value = dataArray[i * step];
                    const height = Math.max(5, (value / 255) * 50);
                    bar.style.height = height + 'px';
                });

                animationId = requestAnimationFrame(draw);
            }

            draw();
        }

        // 停止可视化
        function stopVisualization() {
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }

            const bars = document.querySelectorAll('.visualizer-bar');
            bars.forEach(bar => {
                bar.style.height = '5px';
            });
        }

        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 心跳
        setInterval(() => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'ping' }));
            }
        }, 30000);
    </script>
</body>
</html>
